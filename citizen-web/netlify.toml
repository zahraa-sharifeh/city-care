# Netlify — citizen-web (connect repo with Base directory = citizen-web)
[build]
  command = "npm run build"
  publish = "build"

[build.environment]
  NODE_VERSION = "20"
  NPM_FLAGS = "--legacy-peer-deps"
  CI = "false"

# React Router (SPA)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
