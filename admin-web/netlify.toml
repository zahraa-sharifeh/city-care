# Netlify — admin-web (connect repo with Base directory = admin-web)
[build]
  command = "npm run build"
  publish = "build"

[build.environment]
  NODE_VERSION = "20"
  NPM_FLAGS = "--legacy-peer-deps"
  # CRA treats ESLint warnings as errors when CI=true (Netlify default)
  CI = "false"

# React Router (SPA)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
